file.upHtmlFolder=D:/data/html/
#application.properties 是 Spring Boot 中用来配置应用程序的文件，其中包含了许多可用的选项：
#服务器端口：server.port
#应用程序上下文路径：server.servlet.context-path
#数据库驱动、URL、用户名和密码：spring.datasource.driver-class-name、spring.datasource.url、spring.datasource.username 和 spring.datasource.password。
#日志级别：logging.level.root（根日志级别）、logging.level.package_name（指定包名的日志级别）。
#静态资源路径：spring.resources.static-locations
#自定义属性的方法(自定义属性名称=值)名称和值用‘=’等于号空格分隔
#application.properties不需要注意缩进!!!
#这只是一些常见的选项，当然还有更多的选项可以在 application.properties 文件中进行配置，具体要根据应用程序需要来决定。需要注意的是，与 application.yml 不同，使用 application.properties 时，属性之间是通过等号 "=" 来分隔的。